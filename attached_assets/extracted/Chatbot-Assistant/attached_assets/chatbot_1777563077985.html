<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber AI | Self-Learning Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <button id="themeToggle" class="theme-switch">
        <span class="icon">🌙</span>
    </button>

    <div id="welcomeScreen" class="welcome-container">
        <div class="welcome-content">
            <div class="logo-box">🛡️ CYBER_AI</div>
            <div class="robot-visual">
                <img src="https://i.pinimg.com/originals/88/4a/0a/884a0a4e76a664e42880b9156686018c.jpg" alt="Cyber AI" class="main-robot">
                <div class="scan-line"></div>
            </div>
            <h1 class="welcome-title">System <span class="accent">Ready</span></h1>
            <p class="welcome-subtitle">Evolved Intelligence. Emotional Core Online.</p>
            <button id="startChatBtn" class="init-btn">Initialize Connection</button>
        </div>
    </div>

    <div id="chatInterface" class="main-app-container" style="display: none;">
        <header class="app-header">
            <div class="bot-status">
                <div class="status-dot online"></div>
                <h4>Cyber AI <span class="ai-tag">v2.0</span></h4>
            </div>
            <button class="menu-btn" id="clearMemory">Clear Memory</button>
        </header>

        <div id="chatBox" class="chat-viewport">
            <div class="msg bot-msg">System initialized. I am Cyber AI. I can understand your emotions and learn from our interactions. How can I help you today?</div>
        </div>

        <footer class="input-section">
            <div class="input-bar-wrapper">
                <input type="text" id="userInput" placeholder="Message Cyber AI...">
                
                <button id="micBtn" class="mic-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v11m4.22-5.78a6 6 0 1 1-8.44 0"></path></svg>
                </button>

                <button id="sendBtn" class="send-action-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
