kind = "web"
previewPath = "/"
title = "Cyber AI Chatbot"
version = "1.0.0"
id = "artifacts/cyber-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21380

[services.development]
run = "pnpm --filter @workspace/cyber-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-ai", "run", "build" ]
publicDir = "artifacts/cyber-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21380"
BASE_PATH = "/"
